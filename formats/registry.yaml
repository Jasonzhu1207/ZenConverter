version: 0
policy:
  unsupported_behavior: "Show explicitly. Do not imply full support."
  local_processing: "Required unless a future feature is clearly marked online."

groups:
  media:
    planned:
      - from: mp4
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Extracts the first audio track and encodes MP3 through libmp3lame after runtime encoder probing. Physical-device sample verification is still pending."
      - from: mp4
        to: mp4
        engine: media3-transformer
        status: experimental
        note: "Native MP4 output path. Default settings preserve where possible; explicit options may transcode."
      - from: mp4
        to: mkv
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg re-encode path. Encodes the first video track with the selected H.264/H.265 option and writes AAC audio; subtitles, attachments, and extra tracks are not copied."
      - from: mkv
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg re-encode path. Encodes the first video track with the selected H.264/H.265 option and writes AAC audio."
      - from: mov
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg re-encode path. Encodes the first video track with the selected H.264/H.265 option and writes AAC audio."
      - from: webm
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg re-encode path. Encodes the first video track with the selected H.264/H.265 option and writes AAC audio."
      - from: avi
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg re-encode path. Encodes the first video track with the selected H.264/H.265 option and writes AAC audio."
      - from: 3gp
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg re-encode path. Encodes the first video track with the selected H.264/H.265 option and writes AAC audio."
      - from: 3gpp
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "Alias of 3GP for routing. Uses the same FFmpeg re-encode path."
      - from: ts
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg re-encode path. Encodes the first video track with the selected H.264/H.265 option and writes AAC audio."
      - from: mts
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "TS-family alias for routing. Uses the same FFmpeg re-encode path."
      - from: mp3
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Re-encodes MP3 through libmp3lame after runtime encoder probing. Bitrate, sample rate, and channel controls are passed when selected."
      - from: m4a
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes MP3 through libmp3lame after runtime encoder probing. Physical-device sample verification is still pending."
      - from: flac
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes MP3 through libmp3lame after runtime encoder probing. Physical-device sample verification is still pending."
      - from: wav
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes MP3 through libmp3lame after runtime encoder probing. Physical-device sample verification is still pending."
      - from: wma
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Decodes WMA through FFmpeg and encodes MP3 through libmp3lame after runtime encoder probing."
      - from: mp3
        to: m4a
        engine: media3-transformer
        status: experimental
        note: "AAC in M4A. Bitrate, sample rate, and channel controls are best-effort native settings."
      - from: m4a
        to: m4a
        engine: media3-transformer
        status: experimental
        note: "Can preserve compatible AAC where possible; explicit audio options may transcode."
      - from: flac
        to: m4a
        engine: media3-transformer
        status: experimental
        note: "AAC in M4A. Depends on device decode support."
      - from: wav
        to: m4a
        engine: media3-transformer
        status: experimental
        note: "AAC in M4A. Depends on device decode support."
      - from: wma
        to: m4a
        engine: ffmpeg-compatible
        status: experimental
        note: "Attempts AAC in M4A through FFmpeg compatibility mode; may fail if the package lacks AAC encoding."
      - from: ogg
        to: m4a
        engine: media3-transformer
        status: experimental
        note: "AAC in M4A. Depends on device decode support."
      - from: mp3
        to: wav
        engine: ffmpeg-compatible
        status: experimental
        note: "Writes PCM WAV. Sample rate and channel controls are passed when selected; bitrate is not used."
      - from: m4a
        to: wav
        engine: ffmpeg-compatible
        status: experimental
        note: "Writes PCM WAV through FFmpeg compatibility mode."
      - from: flac
        to: wav
        engine: ffmpeg-compatible
        status: experimental
        note: "Writes PCM WAV through FFmpeg compatibility mode."
      - from: wav
        to: wav
        engine: ffmpeg-compatible
        status: experimental
        note: "Rewrites PCM WAV; bitrate is not used."
      - from: wma
        to: wav
        engine: ffmpeg-compatible
        status: experimental
        note: "Decodes WMA through FFmpeg and writes PCM WAV when the bundled codecs are available."
      - from: mp3
        to: flac
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes FLAC. Sample rate and channel controls are passed when selected; bitrate is not used."
      - from: m4a
        to: flac
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes FLAC through FFmpeg compatibility mode."
      - from: flac
        to: flac
        engine: ffmpeg-compatible
        status: experimental
        note: "Re-encodes FLAC; bitrate is not used."
      - from: wav
        to: flac
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes FLAC through FFmpeg compatibility mode."
      - from: wma
        to: flac
        engine: ffmpeg-compatible
        status: experimental
        note: "Decodes WMA through FFmpeg and encodes FLAC when the bundled codecs are available."
      - from: mp3
        to: wma
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes WMA v2 in an ASF/WMA container through FFmpeg compatibility mode."
      - from: m4a
        to: wma
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes WMA v2 in an ASF/WMA container through FFmpeg compatibility mode."
      - from: flac
        to: wma
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes WMA v2 in an ASF/WMA container through FFmpeg compatibility mode."
      - from: wav
        to: wma
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes WMA v2 in an ASF/WMA container through FFmpeg compatibility mode."
      - from: wma
        to: wma
        engine: ffmpeg-compatible
        status: experimental
        note: "Re-encodes WMA v2 in an ASF/WMA container."
      - from: video
        to: m4a
        engine: media3-transformer-or-ffmpeg-compatible
        status: experimental
        note: "MP4 video sources use Media3 AAC output. Non-MP4 video sources use FFmpeg audio-track copy and currently require an M4A-compatible AAC stream."
      - from: video
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Extracts the first audio track and encodes MP3 through libmp3lame after runtime encoder probing. Physical-device sample verification is still pending."
      - from: video
        to: wav
        engine: ffmpeg-compatible
        status: experimental
        note: "Extracts the first audio track and writes PCM WAV through FFmpeg compatibility mode."
      - from: video
        to: flac
        engine: ffmpeg-compatible
        status: experimental
        note: "Extracts the first audio track and encodes FLAC through FFmpeg compatibility mode."
      - from: video
        to: wma
        engine: ffmpeg-compatible
        status: experimental
        note: "Extracts the first audio track and encodes WMA v2 through FFmpeg compatibility mode."
  image:
    planned:
      - from: jpg/jpeg/jfif/jpe
        to: jpg/jfif
        engine: native-bitmap
        status: experimental
        note: "JPEG-family static image decode/encode through Android Bitmap APIs. JFIF output is JPEG-encoded pixels with a .jfif extension; metadata is not preserved."
      - from: jpg/jpeg/jfif/jpe
        to: png
        engine: native-bitmap
        status: experimental
        note: "Static image decode/encode through Android Bitmap APIs. Metadata is not copied; JPEG EXIF orientation is applied best-effort."
      - from: jpg/jpeg/jfif/jpe
        to: webp/ico
        engine: native-bitmap
        status: experimental
        note: "Static image decode/encode through Android Bitmap APIs. WEBP output is lossy unless the Android 11+ lossless option is selected. ICO output is a modern multi-size PNG-in-ICO file."
      - from: png
        to: jpg/jfif
        engine: native-bitmap
        status: experimental
        note: "Transparency is flattened to white for JPEG-family output."
      - from: png
        to: png
        engine: native-bitmap
        status: experimental
        note: "PNG output is written losslessly through the platform encoder."
      - from: png
        to: webp/ico
        engine: native-bitmap
        status: experimental
        note: "Static image decode/encode through Android Bitmap APIs. WEBP output is lossy unless the Android 11+ lossless option is selected. ICO output is a modern multi-size PNG-in-ICO file."
      - from: webp
        to: jpg/jfif
        engine: native-bitmap
        status: experimental
        note: "Static WEBP only; animated WEBP is not preserved as animation."
      - from: webp
        to: png
        engine: native-bitmap
        status: experimental
        note: "Static WEBP only; animated WEBP is not preserved as animation."
      - from: webp
        to: webp/ico
        engine: native-bitmap
        status: experimental
        note: "Static WEBP only. Android 11+ can write WEBP lossless when selected; otherwise WEBP output is lossy. ICO output is a modern multi-size PNG-in-ICO file."
      - from: ico
        to: jpg/jfif/png/webp/ico
        engine: native-bitmap
        status: experimental
        note: "Reads the largest ICO layer when that layer is PNG-in-ICO, then reuses the static image output path. Old BMP/DIB icon payloads are not decoded in this milestone."
      - from: gif
        to: jpg/jfif/png/webp/ico
        engine: native-bitmap/ffmpeg-compatible
        status: experimental
        note: "Can use the first decoded frame, or split GIF frames through the FFmpeg compatibility path as raw RGBA frames, then write numbered files inside a subfolder. Split output does not preserve animation timing, loop count, frame delay, or metadata."
      - from: heic/heif
        to: jpg/jfif/png/webp/ico
        engine: native-bitmap
        status: experimental
        note: "Attempts platform HEIC/HEIF decode through Android ImageDecoder/BitmapFactory. Support depends on device and Android image codec availability. ICO output is available only after platform decode succeeds."
  pdf:
    planned:
      - from: jpg/jpeg/jfif/jpe
        to: pdf
        engine: native-pdfdocument
        status: experimental
        note: "Creates one image-backed PDF page per input image through Android PdfDocument. A4-fit and original-ratio page modes are supported; source image decode is capped for memory safety."
      - from: png
        to: pdf
        engine: native-pdfdocument
        status: experimental
        note: "Creates one image-backed PDF page per input image through Android PdfDocument. Transparency is flattened onto a white page background."
      - from: webp
        to: pdf
        engine: native-pdfdocument
        status: experimental
        note: "Static WEBP only; animated WEBP is not preserved as animation."
      - from: ico
        to: pdf
        engine: native-pdfdocument
        status: experimental
        note: "Places the largest decoded ICO layer on one PDF page when that layer is PNG-in-ICO. Old BMP/DIB icon payloads are not decoded in this milestone."
      - from: gif
        to: pdf
        engine: native-pdfdocument/ffmpeg-compatible
        status: experimental
        note: "Can place only the first decoded GIF frame, expand all split frames into one PDF, or write one PDF per frame inside a subfolder. Split output does not preserve animation timing, loop count, frame delay, or metadata."
      - from: heic/heif
        to: pdf
        engine: native-pdfdocument
        status: experimental
        note: "Attempts platform HEIC/HEIF decode before placing the image on a PDF page. Support depends on device and Android image codec availability."
      - from: pdf
        to: png
        engine: native-pdfrenderer
        status: experimental
        note: "Renders each PDF page to a same-sized PNG bitmap through Android PdfRenderer. This is rasterization, not OCR or embedded-image extraction."
      - from: pdf
        to: jpg
        engine: native-pdfrenderer
        status: experimental
        note: "Renders each PDF page to a same-sized JPG bitmap through Android PdfRenderer. Password support depends on Android 15 or PDF extension 13."
      - from: pdf
        to: webp
        engine: native-pdfrenderer
        status: experimental
        note: "Renders each PDF page to a same-sized WEBP bitmap through Android PdfRenderer with low, balanced, and high-detail render presets."
      - from: pdf
        to: pdf
        engine: pdfbox-android
        status: experimental
        note: "True PDF merge for multiple selected PDFs. Preserves normal page objects, vector content, and selectable text best-effort; complex forms, bookmarks, attachments, and metadata are not guaranteed. Password-protected source PDFs can be loaded with transient passwords."
      - from: pdf
        to: txt
        engine: pdfbox-android
        status: experimental
        note: "Extracts selectable text with page separators through PDFBox-Android. This is not OCR; scanned PDFs without a text layer fail clearly. Password-protected source PDFs can be loaded with transient passwords."
  document:
    planned:
      - from: docx
        to: pdf
        engine: office2pdf-native
        status: experimental
        note: "Converts OOXML Word documents to PDF through the bundled arm64-v8a libzen_office2pdf.so. The current JNI build passes bundled Noto Sans and Noto Serif CJK through explicit native font paths; Chinese text renders on an arm64 physical device, but layout fidelity remains experimental."
      - from: pptx
        to: pdf
        engine: office2pdf-native
        status: experimental
        note: "Converts OOXML PowerPoint presentations to PDF through the bundled arm64-v8a libzen_office2pdf.so. The current JNI build passes bundled Noto Sans and Noto Serif CJK through explicit native font paths; Chinese text renders on an arm64 physical device, but slide layout fidelity remains experimental."
      - from: xlsx
        to: pdf
        engine: office2pdf-native
        status: experimental
        note: "Converts OOXML Excel workbooks to PDF through the bundled arm64-v8a libzen_office2pdf.so. The current JNI build passes bundled Noto Sans and Noto Serif CJK through explicit native font paths; Chinese text renders on an arm64 physical device, but spreadsheet pagination and layout fidelity remain experimental."
