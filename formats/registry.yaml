version: 0
policy:
  unsupported_behavior: "Show explicitly. Do not imply full support."
  local_processing: "Required unless a future feature is clearly marked online."

groups:
  media:
    planned:
      - from: mp4
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Extracts the first audio track and encodes MP3 through libmp3lame after runtime encoder probing. Physical-device sample verification is still pending."
      - from: mp4
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg re-encode path. Encodes the first video track with H.264/H.265 and writes AAC audio. Manual mode exposes video/audio controls; smart compression modes own CRF/preset/resolution/frame-rate strategy and AAC audio bitrate. Manual-mode advanced filters apply where selected."
      - from: mp4
        to: mkv
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg re-encode path. Encodes the first video track with H.264/H.265 and writes AAC audio. Manual mode exposes video/audio controls; smart compression modes own CRF/preset/resolution/frame-rate strategy and AAC audio bitrate. Manual-mode advanced filters apply. Subtitles, attachments, and extra tracks are not copied."
      - from: video
        to: mov
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg re-encode path for video inputs. Encodes the first video track with H.264/H.265 and writes AAC audio in a QuickTime MOV container. Smart compression modes own CRF/preset/resolution/frame-rate strategy and AAC audio bitrate; manual-mode advanced filters apply."
      - from: video
        to: gif
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg animated GIF output for video inputs. Uses palettegen/paletteuse, drops audio/subtitles/data streams, loops by default, and automatically limits output to the first 30 seconds, 30 fps, and 900 frames. GIF resolution defaults to a 480 px short side with 720 px and Original options."
      - from: mkv
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg re-encode path. Encodes the first video track with H.264/H.265 and writes AAC audio. Smart compression modes own CRF/preset/resolution/frame-rate strategy and AAC audio bitrate."
      - from: mov
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg re-encode path. Encodes the first video track with H.264/H.265 and writes AAC audio. Smart compression modes own CRF/preset/resolution/frame-rate strategy and AAC audio bitrate."
      - from: webm
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg re-encode path. Encodes the first video track with H.264/H.265 and writes AAC audio. Smart compression modes own CRF/preset/resolution/frame-rate strategy and AAC audio bitrate."
      - from: avi
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg re-encode path. Encodes the first video track with H.264/H.265 and writes AAC audio. Smart compression modes own CRF/preset/resolution/frame-rate strategy and AAC audio bitrate."
      - from: 3gp
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg re-encode path. Encodes the first video track with H.264/H.265 and writes AAC audio. Smart compression modes own CRF/preset/resolution/frame-rate strategy and AAC audio bitrate."
      - from: 3gpp
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "Alias of 3GP for routing. Uses the same FFmpeg re-encode path and video smart compression modes."
      - from: ts
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg re-encode path. Encodes the first video track with H.264/H.265 and writes AAC audio. Smart compression modes own CRF/preset/resolution/frame-rate strategy and AAC audio bitrate."
      - from: mts
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "TS-family alias for routing. Uses the same FFmpeg re-encode path and video smart compression modes."
      - from: mp3
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Re-encodes MP3 through libmp3lame after runtime encoder probing. Bitrate, sample rate, channel, and advanced audio filter controls are passed when selected."
      - from: m4a
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes MP3 through libmp3lame after runtime encoder probing. Advanced audio filters apply where selected. Physical-device sample verification is still pending."
      - from: flac
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes MP3 through libmp3lame after runtime encoder probing. Advanced audio filters apply where selected. Physical-device sample verification is still pending."
      - from: wav
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes MP3 through libmp3lame after runtime encoder probing. Advanced audio filters apply where selected. Physical-device sample verification is still pending."
      - from: wma
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Decodes WMA through FFmpeg and encodes MP3 through libmp3lame after runtime encoder probing. Advanced audio filters apply where selected."
      - from: mp3
        to: m4a
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes AAC in an M4A container through FFmpeg compatibility mode. Bitrate, sample-rate, channel, and advanced audio filter controls are passed when selected."
      - from: m4a
        to: m4a
        engine: ffmpeg-compatible
        status: experimental
        note: "Re-encodes AAC in an M4A container through FFmpeg compatibility mode. This is not audio stream copy; advanced audio filters apply where selected."
      - from: flac
        to: m4a
        engine: ffmpeg-compatible
        status: experimental
        note: "Decodes through FFmpeg and encodes AAC in an M4A container. Bitrate, sample-rate, channel, and advanced audio filter controls are passed when selected."
      - from: wav
        to: m4a
        engine: ffmpeg-compatible
        status: experimental
        note: "Decodes through FFmpeg and encodes AAC in an M4A container. Bitrate, sample-rate, channel, and advanced audio filter controls are passed when selected."
      - from: wma
        to: m4a
        engine: ffmpeg-compatible
        status: experimental
        note: "Attempts AAC in M4A through FFmpeg compatibility mode; may fail if the package lacks AAC encoding. Advanced audio filters apply where selected."
      - from: ogg
        to: m4a
        engine: ffmpeg-compatible
        status: experimental
        note: "Decodes through FFmpeg and encodes AAC in an M4A container when the bundled decoders can read the source. Advanced audio filters apply where selected."
      - from: mp3
        to: wav
        engine: ffmpeg-compatible
        status: experimental
        note: "Writes PCM WAV. Sample rate, channel, and advanced audio filter controls are passed when selected; bitrate is not used."
      - from: m4a
        to: wav
        engine: ffmpeg-compatible
        status: experimental
        note: "Writes PCM WAV through FFmpeg compatibility mode. Advanced audio filters apply where selected."
      - from: flac
        to: wav
        engine: ffmpeg-compatible
        status: experimental
        note: "Writes PCM WAV through FFmpeg compatibility mode. Advanced audio filters apply where selected."
      - from: wav
        to: wav
        engine: ffmpeg-compatible
        status: experimental
        note: "Rewrites PCM WAV; bitrate is not used. Advanced audio filters apply where selected."
      - from: wma
        to: wav
        engine: ffmpeg-compatible
        status: experimental
        note: "Decodes WMA through FFmpeg and writes PCM WAV when the bundled codecs are available. Advanced audio filters apply where selected."
      - from: mp3
        to: flac
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes FLAC. Sample rate, channel, and advanced audio filter controls are passed when selected; bitrate is not used."
      - from: m4a
        to: flac
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes FLAC through FFmpeg compatibility mode. Advanced audio filters apply where selected."
      - from: flac
        to: flac
        engine: ffmpeg-compatible
        status: experimental
        note: "Re-encodes FLAC; bitrate is not used. Advanced audio filters apply where selected."
      - from: wav
        to: flac
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes FLAC through FFmpeg compatibility mode. Advanced audio filters apply where selected."
      - from: wma
        to: flac
        engine: ffmpeg-compatible
        status: experimental
        note: "Decodes WMA through FFmpeg and encodes FLAC when the bundled codecs are available. Advanced audio filters apply where selected."
      - from: mp3
        to: wma
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes WMA v2 in an ASF/WMA container through FFmpeg compatibility mode. Advanced audio filters apply where selected."
      - from: m4a
        to: wma
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes WMA v2 in an ASF/WMA container through FFmpeg compatibility mode. Advanced audio filters apply where selected."
      - from: flac
        to: wma
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes WMA v2 in an ASF/WMA container through FFmpeg compatibility mode. Advanced audio filters apply where selected."
      - from: wav
        to: wma
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes WMA v2 in an ASF/WMA container through FFmpeg compatibility mode. Advanced audio filters apply where selected."
      - from: wma
        to: wma
        engine: ffmpeg-compatible
        status: experimental
        note: "Re-encodes WMA v2 in an ASF/WMA container. Advanced audio filters apply where selected."
      - from: video
        to: m4a
        engine: ffmpeg-compatible
        status: experimental
        note: "Extracts the first audio track and re-encodes AAC in an M4A container through FFmpeg compatibility mode. This is not audio stream copy; advanced audio filters apply where selected."
      - from: video
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Extracts the first audio track and encodes MP3 through libmp3lame after runtime encoder probing. Advanced audio filters apply where selected. Physical-device sample verification is still pending."
      - from: video
        to: wav
        engine: ffmpeg-compatible
        status: experimental
        note: "Extracts the first audio track and writes PCM WAV through FFmpeg compatibility mode. Advanced audio filters apply where selected."
      - from: video
        to: flac
        engine: ffmpeg-compatible
        status: experimental
        note: "Extracts the first audio track and encodes FLAC through FFmpeg compatibility mode. Advanced audio filters apply where selected."
      - from: video
        to: wma
        engine: ffmpeg-compatible
        status: experimental
        note: "Extracts the first audio track and encodes WMA v2 through FFmpeg compatibility mode. Advanced audio filters apply where selected."
  image:
    planned:
      - from: jpg/jpeg/jfif/jpe
        to: jpg/jfif
        engine: native-bitmap
        status: experimental
        note: "JPEG-family static image decode/encode through Android Bitmap APIs. JFIF output is JPEG-encoded pixels with a .jfif extension; metadata is not preserved."
      - from: jpg/jpeg/jfif/jpe
        to: png
        engine: native-bitmap
        status: experimental
        note: "Static image decode/encode through Android Bitmap APIs. Metadata is not copied; JPEG EXIF orientation is applied best-effort."
      - from: jpg/jpeg/jfif/jpe
        to: webp/ico
        engine: native-bitmap
        status: experimental
        note: "Static image decode/encode through Android Bitmap APIs. WEBP output is lossy unless the Android 11+ lossless option is selected. ICO output is a modern multi-size PNG-in-ICO file."
      - from: png
        to: jpg/jfif
        engine: native-bitmap
        status: experimental
        note: "Transparency is flattened to white for JPEG-family output."
      - from: png
        to: png
        engine: native-bitmap
        status: experimental
        note: "PNG output is written losslessly through the platform encoder."
      - from: png
        to: webp/ico
        engine: native-bitmap
        status: experimental
        note: "Static image decode/encode through Android Bitmap APIs. WEBP output is lossy unless the Android 11+ lossless option is selected. ICO output is a modern multi-size PNG-in-ICO file."
      - from: webp
        to: jpg/jfif
        engine: native-bitmap
        status: experimental
        note: "Static WEBP only; animated WEBP is not preserved as animation."
      - from: webp
        to: png
        engine: native-bitmap
        status: experimental
        note: "Static WEBP only; animated WEBP is not preserved as animation."
      - from: webp
        to: webp/ico
        engine: native-bitmap
        status: experimental
        note: "Static WEBP only. Android 11+ can write WEBP lossless when selected; otherwise WEBP output is lossy. ICO output is a modern multi-size PNG-in-ICO file."
      - from: ico
        to: jpg/jfif/png/webp/ico
        engine: native-bitmap
        status: experimental
        note: "Reads the largest ICO layer when that layer is PNG-in-ICO, then reuses the static image output path. Old BMP/DIB icon payloads are not decoded in this milestone."
      - from: gif
        to: jpg/jfif/png/webp/ico
        engine: native-bitmap/ffmpeg-compatible
        status: experimental
        note: "Can use the first decoded frame, or split GIF frames through the FFmpeg compatibility path as raw RGBA frames, then write numbered files inside a subfolder. Split output does not preserve animation timing, loop count, frame delay, or metadata."
      - from: heic/heif
        to: jpg/jfif/png/webp/ico
        engine: native-bitmap
        status: experimental
        note: "Attempts platform HEIC/HEIF decode through Android ImageDecoder/BitmapFactory. Support depends on device and Android image codec availability. ICO output is available only after platform decode succeeds."
  pdf:
    planned:
      - from: jpg/jpeg/jfif/jpe
        to: pdf
        engine: native-pdfdocument
        status: experimental
        note: "Creates one image-backed PDF page per input image through Android PdfDocument. A4-fit and original-ratio page modes are supported; source image decode is capped for memory safety."
      - from: png
        to: pdf
        engine: native-pdfdocument
        status: experimental
        note: "Creates one image-backed PDF page per input image through Android PdfDocument. Transparency is flattened onto a white page background."
      - from: webp
        to: pdf
        engine: native-pdfdocument
        status: experimental
        note: "Static WEBP only; animated WEBP is not preserved as animation."
      - from: ico
        to: pdf
        engine: native-pdfdocument
        status: experimental
        note: "Places the largest decoded ICO layer on one PDF page when that layer is PNG-in-ICO. Old BMP/DIB icon payloads are not decoded in this milestone."
      - from: gif
        to: pdf
        engine: native-pdfdocument/ffmpeg-compatible
        status: experimental
        note: "Can place only the first decoded GIF frame, expand all split frames into one PDF, or write one PDF per frame inside a subfolder. Split output does not preserve animation timing, loop count, frame delay, or metadata."
      - from: heic/heif
        to: pdf
        engine: native-pdfdocument
        status: experimental
        note: "Attempts platform HEIC/HEIF decode before placing the image on a PDF page. Support depends on device and Android image codec availability."
      - from: pdf
        to: png
        engine: native-pdfrenderer
        status: experimental
        note: "Renders each PDF page to a same-sized PNG bitmap through Android PdfRenderer. This is rasterization, not OCR or embedded-image extraction."
      - from: pdf
        to: jpg
        engine: native-pdfrenderer
        status: experimental
        note: "Renders each PDF page to a same-sized JPG bitmap through Android PdfRenderer. Password support depends on Android 15 or PDF extension 13."
      - from: pdf
        to: webp
        engine: native-pdfrenderer
        status: experimental
        note: "Renders each PDF page to a same-sized WEBP bitmap through Android PdfRenderer with low, balanced, and high-detail render presets."
      - from: pdf
        to: pdf
        engine: pdfbox-android
        status: experimental
        note: "True PDF merge for multiple selected PDFs. Preserves normal page objects, vector content, and selectable text best-effort; complex forms, bookmarks, attachments, and metadata are not guaranteed. Password-protected source PDFs can be loaded with transient passwords."
      - from: pdf
        to: txt
        engine: pdfbox-android
        status: experimental
        note: "Extracts selectable text with page separators through PDFBox-Android. This is not OCR; scanned PDFs without a text layer fail clearly. Password-protected source PDFs can be loaded with transient passwords."
      - from: pdf
        to: md
        engine: pdfbox-android
        status: experimental
        note: "Exports lightweight Markdown through PDFBox-Android text extraction. Output uses a document title and per-page headings only; it does not do OCR, table reconstruction, or heading inference. Password-protected source PDFs can be loaded with transient passwords."
      - from: pdf
        to: encrypted-pdf
        engine: pdfbox-android
        status: experimental
        note: "Applies a single open password through PDFBox-Android standard protection. The output password is kept in memory only and is not logged or persisted. This does not expose owner/user password separation or a permissions matrix."
      - from: pdf
        to: decrypted-pdf
        engine: pdfbox-android
        status: experimental
        note: "Removes PDF security only when the source PDF can be opened normally or with the user-provided source password. This is not password cracking; unsupported or incorrect passwords fail clearly. Unencrypted PDFs can still be saved as normal PDF copies."
  document:
    planned:
      - from: docx
        to: pdf
        engine: office2pdf-native
        status: experimental
        note: "Converts OOXML Word documents to PDF through the bundled arm64-v8a libzen_office2pdf.so. The current JNI build passes bundled Noto Sans and Noto Serif CJK through explicit native font paths; Chinese text renders on an arm64 physical device, but layout fidelity remains experimental."
      - from: docx
        to: txt
        engine: office2pdf-native/pdfbox-android
        status: experimental
        note: "Converts DOCX to an intermediate PDF through the bundled Office engine, then extracts selectable text with PDFBox-Android. Inherits the Office path's 64 MiB input cap and layout/text extraction limits; no OCR."
      - from: docx
        to: md
        engine: office2pdf-native/pdfbox-android
        status: experimental
        note: "Converts DOCX to an intermediate PDF, then writes lightweight Markdown with a title and per-page headings. Inherits the Office path's 64 MiB input cap and PDF text-layer limits; no high-fidelity structure reconstruction."
      - from: pptx
        to: pdf
        engine: office2pdf-native
        status: experimental
        note: "Converts OOXML PowerPoint presentations to PDF through the bundled arm64-v8a libzen_office2pdf.so. The current JNI build passes bundled Noto Sans and Noto Serif CJK through explicit native font paths; Chinese text renders on an arm64 physical device, but slide layout fidelity remains experimental."
      - from: pptx
        to: txt
        engine: office2pdf-native/pdfbox-android
        status: experimental
        note: "Converts PPTX to an intermediate PDF through the bundled Office engine, then extracts selectable text with PDFBox-Android. Inherits the Office path's 64 MiB input cap and slide layout/text extraction limits; no OCR."
      - from: pptx
        to: md
        engine: office2pdf-native/pdfbox-android
        status: experimental
        note: "Converts PPTX to an intermediate PDF, then writes lightweight Markdown with a title and per-page headings. Inherits the Office path's 64 MiB input cap and PDF text-layer limits; no high-fidelity slide structure reconstruction."
      - from: xlsx
        to: pdf
        engine: office2pdf-native
        status: experimental
        note: "Converts OOXML Excel workbooks to PDF through the bundled arm64-v8a libzen_office2pdf.so. The current JNI build passes bundled Noto Sans and Noto Serif CJK through explicit native font paths; Chinese text renders on an arm64 physical device, but spreadsheet pagination and layout fidelity remain experimental."
      - from: xlsx
        to: txt
        engine: office2pdf-native/pdfbox-android
        status: experimental
        note: "Converts XLSX to an intermediate PDF through the bundled Office engine, then extracts selectable text with PDFBox-Android. Inherits the Office path's 64 MiB input cap and spreadsheet pagination/text extraction limits; no OCR."
      - from: xlsx
        to: md
        engine: office2pdf-native/pdfbox-android
        status: experimental
        note: "Converts XLSX to an intermediate PDF, then writes lightweight Markdown with a title and per-page headings. Inherits the Office path's 64 MiB input cap and PDF text-layer limits; no high-fidelity spreadsheet structure reconstruction."
  metadata:
    planned:
      - from: jpg/jpeg/jfif/jpe
        to: inspect/clean/restore-metadata
        engine: native-jpeg-segment
        status: experimental
        note: "Separate privacy tool. Inspects common EXIF values and removable JPEG metadata segments, then can remove EXIF/XMP, IPTC/Photoshop, and comment segments in place without re-encoding image pixels. JFIF, ICC, and Adobe display-related segments are preserved. Removed metadata is stored in app-private backup data and can be restored only when the selected image's metadata-stripped core SHA-256 and dimensions match."
      - from: png/webp/heic/heif/gif/ico
        to: inspect-metadata
        engine: native-basic-info
        status: experimental
        note: "Basic image information may be displayed where Android platform APIs expose it. Lossless metadata cleanup is not connected for these formats in this milestone."
      - from: video
        to: inspect-metadata
        engine: media-metadata-retriever
        status: experimental
        note: "Displays basic video metadata such as duration, size, resolution, frame rate, and container bitrate where Android exposes it. Video metadata cleanup is intentionally not connected."
