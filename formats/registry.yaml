version: 0
policy:
  unsupported_behavior: "Show explicitly. Do not imply full support."
  local_processing: "Required unless a future feature is clearly marked online."

groups:
  media:
    planned:
      - from: mp4
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Extracts the first audio track and encodes MP3 through libmp3lame in the current self-built FFmpegKitNext AAR. Physical-device sample verification is still pending."
      - from: mp4
        to: mp4
        engine: media3-transformer
        status: experimental
        note: "Native MP4 output path. Default settings preserve where possible; explicit options may transcode."
      - from: mkv
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg Free tier remux path. Copies one video track and optional first audio track; codecs must already be MP4-compatible."
      - from: webm
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg Free tier remux path. Fails clearly when streams cannot be copied into MP4."
      - from: avi
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg Free tier remux path. Copies compatible streams without video re-encoding."
      - from: 3gp
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg Free tier remux path. Copies compatible streams without video re-encoding."
      - from: 3gpp
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "Alias of 3GP for routing. Copies compatible streams without video re-encoding."
      - from: ts
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "FFmpeg Free tier remux path. Copies compatible streams without video re-encoding."
      - from: mts
        to: mp4
        engine: ffmpeg-compatible
        status: experimental
        note: "TS-family alias for routing. Copies compatible streams without video re-encoding."
      - from: mp3
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Re-encodes MP3 through libmp3lame in the current self-built FFmpegKitNext AAR. Bitrate, sample rate, and channel controls are passed when selected."
      - from: m4a
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes MP3 through libmp3lame in the current self-built FFmpegKitNext AAR. Physical-device sample verification is still pending."
      - from: flac
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes MP3 through libmp3lame in the current self-built FFmpegKitNext AAR. Physical-device sample verification is still pending."
      - from: wav
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes MP3 through libmp3lame in the current self-built FFmpegKitNext AAR. Physical-device sample verification is still pending."
      - from: wma
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Decodes WMA through FFmpeg and encodes MP3 through libmp3lame in the current self-built FFmpegKitNext AAR."
      - from: mp3
        to: m4a
        engine: media3-transformer
        status: experimental
        note: "AAC in M4A. Bitrate, sample rate, and channel controls are best-effort native settings."
      - from: m4a
        to: m4a
        engine: media3-transformer
        status: experimental
        note: "Can preserve compatible AAC where possible; explicit audio options may transcode."
      - from: flac
        to: m4a
        engine: media3-transformer
        status: experimental
        note: "AAC in M4A. Depends on device decode support."
      - from: wav
        to: m4a
        engine: media3-transformer
        status: experimental
        note: "AAC in M4A. Depends on device decode support."
      - from: wma
        to: m4a
        engine: ffmpeg-compatible
        status: experimental
        note: "Attempts AAC in M4A through FFmpeg compatibility mode; may fail if the package lacks AAC encoding."
      - from: ogg
        to: m4a
        engine: media3-transformer
        status: experimental
        note: "AAC in M4A. Depends on device decode support."
      - from: mp3
        to: wav
        engine: ffmpeg-compatible
        status: experimental
        note: "Writes PCM WAV. Sample rate and channel controls are passed when selected; bitrate is not used."
      - from: m4a
        to: wav
        engine: ffmpeg-compatible
        status: experimental
        note: "Writes PCM WAV through FFmpeg compatibility mode."
      - from: flac
        to: wav
        engine: ffmpeg-compatible
        status: experimental
        note: "Writes PCM WAV through FFmpeg compatibility mode."
      - from: wav
        to: wav
        engine: ffmpeg-compatible
        status: experimental
        note: "Rewrites PCM WAV; bitrate is not used."
      - from: wma
        to: wav
        engine: ffmpeg-compatible
        status: experimental
        note: "Decodes WMA through FFmpeg and writes PCM WAV when the bundled codecs are available."
      - from: mp3
        to: flac
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes FLAC. Sample rate and channel controls are passed when selected; bitrate is not used."
      - from: m4a
        to: flac
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes FLAC through FFmpeg compatibility mode."
      - from: flac
        to: flac
        engine: ffmpeg-compatible
        status: experimental
        note: "Re-encodes FLAC; bitrate is not used."
      - from: wav
        to: flac
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes FLAC through FFmpeg compatibility mode."
      - from: wma
        to: flac
        engine: ffmpeg-compatible
        status: experimental
        note: "Decodes WMA through FFmpeg and encodes FLAC when the bundled codecs are available."
      - from: mp3
        to: wma
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes WMA v2 in an ASF/WMA container through FFmpeg compatibility mode."
      - from: m4a
        to: wma
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes WMA v2 in an ASF/WMA container through FFmpeg compatibility mode."
      - from: flac
        to: wma
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes WMA v2 in an ASF/WMA container through FFmpeg compatibility mode."
      - from: wav
        to: wma
        engine: ffmpeg-compatible
        status: experimental
        note: "Encodes WMA v2 in an ASF/WMA container through FFmpeg compatibility mode."
      - from: wma
        to: wma
        engine: ffmpeg-compatible
        status: experimental
        note: "Re-encodes WMA v2 in an ASF/WMA container."
      - from: video
        to: m4a
        engine: media3-transformer-or-ffmpeg-compatible
        status: experimental
        note: "MP4 video sources use Media3 AAC output. Non-MP4 video sources use FFmpeg audio-track copy and currently require an M4A-compatible AAC stream."
      - from: video
        to: mp3
        engine: ffmpeg-compatible
        status: experimental
        note: "Extracts the first audio track and encodes MP3 through libmp3lame in the current self-built FFmpegKitNext AAR. Physical-device sample verification is still pending."
      - from: video
        to: wav
        engine: ffmpeg-compatible
        status: experimental
        note: "Extracts the first audio track and writes PCM WAV through FFmpeg compatibility mode."
      - from: video
        to: flac
        engine: ffmpeg-compatible
        status: experimental
        note: "Extracts the first audio track and encodes FLAC through FFmpeg compatibility mode."
      - from: video
        to: wma
        engine: ffmpeg-compatible
        status: experimental
        note: "Extracts the first audio track and encodes WMA v2 through FFmpeg compatibility mode."
  image:
    planned:
      - from: jpg
        to: jpg
        engine: native-bitmap
        status: experimental
        note: "Static image decode/encode through Android Bitmap APIs. Original quality is value 100 re-encode, not same-file FastCopy yet."
      - from: jpg
        to: png
        engine: native-bitmap
        status: experimental
        note: "Static image decode/encode through Android Bitmap APIs. Metadata is not copied; JPEG EXIF orientation is applied best-effort."
      - from: jpg
        to: webp
        engine: native-bitmap
        status: experimental
        note: "Static image decode/encode through Android Bitmap APIs. WEBP output is lossy in this milestone."
      - from: png
        to: jpg
        engine: native-bitmap
        status: experimental
        note: "Transparency is flattened to white for JPG output."
      - from: png
        to: png
        engine: native-bitmap
        status: experimental
        note: "PNG output is written losslessly through the platform encoder."
      - from: png
        to: webp
        engine: native-bitmap
        status: experimental
        note: "Static image decode/encode through Android Bitmap APIs. WEBP output is lossy in this milestone."
      - from: webp
        to: jpg
        engine: native-bitmap
        status: experimental
        note: "Static WEBP only; animated WEBP is not preserved as animation."
      - from: webp
        to: png
        engine: native-bitmap
        status: experimental
        note: "Static WEBP only; animated WEBP is not preserved as animation."
      - from: webp
        to: webp
        engine: native-bitmap
        status: experimental
        note: "Static WEBP only; Original quality is value 100 re-encode, not same-file FastCopy yet."
  pdf:
    planned:
      - from: image
        to: pdf
        engine: pdf-library
        status: planned
      - from: pdf
        to: image
        engine: pdf-renderer
        status: planned
