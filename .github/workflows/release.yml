name: Android Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  signed-apk:
    name: Build and publish signed APK
    runs-on: ubuntu-latest

    env:
      APP_NAME: ZenConverter
      PRE_RELEASE_TAG: pre-release
      FFMPEG_AAR: app/libs/ffmpeg-kit-next-7.1.0-lame-arm64-v8a.aar
      FFMPEG_AAR_SHA256: 14fb12d5868b23b7e16a7f17b268364973f5acca059505a42ccdcb6cba1ac9b0

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: platform-tools platforms;android-36 build-tools;36.0.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Verify self-built FFmpegKitNext AAR
        run: |
          set -euo pipefail
          if [ ! -f "$FFMPEG_AAR" ]; then
            echo "::error::Missing self-built FFmpegKitNext AAR: $FFMPEG_AAR"
            echo "::error::Build arthenica/ffmpeg-kit-next v7.1.0 with the recorded flags and provide this AAR before release."
            exit 1
          fi
          actual_sha256="$(sha256sum "$FFMPEG_AAR" | awk '{ print $1 }')"
          if [ "$actual_sha256" != "$FFMPEG_AAR_SHA256" ]; then
            echo "::error::SHA-256 mismatch for $FFMPEG_AAR"
            echo "Expected: $FFMPEG_AAR_SHA256"
            echo "Actual:   $actual_sha256"
            exit 1
          fi
          ls -lh app/libs

      - name: Validate release signing secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          check_secret() {
            variable_name="$1"
            secret_name="$2"
            if [ -z "${!variable_name}" ]; then
              echo "::error::Missing required signing secret: $secret_name"
              missing=1
              return
            fi
            if [ "${!variable_name}" = "$secret_name" ]; then
              echo "::error::$secret_name value looks like the secret name, not the secret value"
              missing=1
            fi
          }
          check_secret KEYSTORE_BASE64 ANDROID_RELEASE_KEYSTORE_BASE64
          check_secret STORE_PASSWORD RELEASE_STORE_PASSWORD
          check_secret KEY_ALIAS RELEASE_KEY_ALIAS
          check_secret KEY_PASSWORD RELEASE_KEY_PASSWORD
          exit "$missing"

      - name: Restore release signing config
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > ci-release.jks
          {
            echo "RELEASE_STORE_FILE=ci-release.jks"
            echo "RELEASE_STORE_PASSWORD=$STORE_PASSWORD"
            echo "RELEASE_KEY_ALIAS=$KEY_ALIAS"
            echo "RELEASE_KEY_PASSWORD=$KEY_PASSWORD"
          } > local.properties

      - name: Verify release keystore
        env:
          STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
        run: |
          set -euo pipefail
          echo "Decoded keystore size: $(wc -c < ci-release.jks) bytes"
          echo "Decoded keystore SHA-256: $(sha256sum ci-release.jks | awk '{ print $1 }')"

          if ! keytool -list \
              -keystore ci-release.jks \
              -storepass "$STORE_PASSWORD" \
              >/tmp/keytool-store.txt 2>/tmp/keytool-store.err; then
            echo "::error::Could not open decoded keystore. Check ANDROID_RELEASE_KEYSTORE_BASE64 and RELEASE_STORE_PASSWORD."
            sed -n '1,5p' /tmp/keytool-store.err
            exit 1
          fi

          if ! keytool -list \
              -keystore ci-release.jks \
              -storepass "$STORE_PASSWORD" \
              -alias "$KEY_ALIAS" \
              >/tmp/keytool-alias.txt 2>/tmp/keytool-alias.err; then
            echo "::error::Keystore opens, but RELEASE_KEY_ALIAS was not found."
            sed -n '1,5p' /tmp/keytool-alias.err
              exit 1
          fi

      - name: Resolve app version
        id: app_version
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            source_tag="${GITHUB_REF_NAME}"
            commits_since_tag=0
            has_source_tag=true
            channel="release"
          else
            source_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"
            if [ -z "$source_tag" ]; then
              source_tag="v0.1.0"
              commits_since_tag=0
              has_source_tag=false
            else
              commits_since_tag="$(git rev-list "${source_tag}..HEAD" --count)"
              has_source_tag=true
            fi
            channel="pre-release"
          fi

          version_name="${source_tag#v}"
          if ! [[ "$version_name" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release tag must look like vMAJOR.MINOR.PATCH, got: $source_tag"
            exit 1
          fi

          IFS=. read -r major minor patch <<< "$version_name"
          version_base=$((10#$major * 100000000 + 10#$minor * 1000000 + 10#$patch * 10000))
          if [ "$channel" = "release" ]; then
            version_code=$((version_base + 1))
          elif [ "$has_source_tag" = "false" ]; then
            version_code=$version_base
          else
            version_offset=$((commits_since_tag + 2))
            if [ "$version_offset" -gt 9999 ]; then
              echo "::error::Too many pre-release commits after $source_tag for this versionCode scheme"
              exit 1
            fi
            version_code=$((version_base + version_offset))
          fi

          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "source_tag=$source_tag" >> "$GITHUB_OUTPUT"
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

          echo "Resolved Android versionName=$version_name"
          echo "Resolved Android versionCode=$version_code"
          echo "Version source tag=$source_tag ($channel)"

      - name: Allow Gradle wrapper execution
        run: chmod +x ./gradlew

      - name: Build signed release APK
        run: |
          ./gradlew --no-daemon clean assembleRelease \
            -Pzenconverter.versionName="${{ steps.app_version.outputs.version_name }}" \
            -Pzenconverter.versionCode="${{ steps.app_version.outputs.version_code }}"

      - name: Prepare release asset
        id: package
        run: |
          set -euo pipefail
          mkdir -p dist
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="${PRE_RELEASE_TAG}"
          fi
          apk_source="$(find app/build/outputs/apk/release -type f -name '*.apk' | head -n 1)"
          if [ -z "$apk_source" ]; then
            echo "::error::No release APK found under app/build/outputs/apk/release"
            exit 1
          fi
          asset_name="${APP_NAME}-${release_tag}-arm64-v8a.apk"
          cp "$apk_source" "dist/$asset_name"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "asset_name=$asset_name" >> "$GITHUB_OUTPUT"
          echo "asset_path=dist/$asset_name" >> "$GITHUB_OUTPUT"

      - name: Publish continuous pre-release
        if: github.ref_type != 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
          ASSET_PATH: ${{ steps.package.outputs.asset_path }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$PRE_RELEASE_TAG" "$GITHUB_SHA"
          git push --force origin "refs/tags/$PRE_RELEASE_TAG"

          cat > release-notes.md <<EOF
          Continuous pre-release build from main.

          Android version: ${{ steps.app_version.outputs.version_name }} (${{ steps.app_version.outputs.version_code }})
          Version source tag: ${{ steps.app_version.outputs.source_tag }}

          Commit: ${GITHUB_SHA}
          EOF

          if gh release view "$PRE_RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$PRE_RELEASE_TAG" \
              --title "Continuous pre-release for ${{ steps.app_version.outputs.source_tag }}" \
              --notes-file release-notes.md \
              --prerelease
          else
            gh release create "$PRE_RELEASE_TAG" \
              --title "Continuous pre-release for ${{ steps.app_version.outputs.source_tag }}" \
              --notes-file release-notes.md \
              --prerelease \
              --target "$GITHUB_SHA"
          fi
          gh release delete-asset "$PRE_RELEASE_TAG" "${APP_NAME}-${PRE_RELEASE_TAG}-armeabi-v7a-arm64-v8a.apk" --yes >/dev/null 2>&1 || true
          gh release delete-asset "$PRE_RELEASE_TAG" "${APP_NAME}-${PRE_RELEASE_TAG}-arm64-v8a.apk" --yes >/dev/null 2>&1 || true
          gh release delete-asset "$PRE_RELEASE_TAG" "${APP_NAME}-${PRE_RELEASE_TAG}-universal.apk" --yes >/dev/null 2>&1 || true
          gh release upload "$PRE_RELEASE_TAG" "$ASSET_PATH" --clobber

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.package.outputs.release_tag }}
          ASSET_PATH: ${{ steps.package.outputs.asset_path }}
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          Signed APK for ${RELEASE_TAG}.

          Android version: ${{ steps.app_version.outputs.version_name }} (${{ steps.app_version.outputs.version_code }})

          Commit: ${GITHUB_SHA}
          EOF

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes-file release-notes.md
          else
            gh release create "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes-file release-notes.md \
              --verify-tag
          fi
          gh release delete-asset "$RELEASE_TAG" "${APP_NAME}-${RELEASE_TAG}-armeabi-v7a-arm64-v8a.apk" --yes >/dev/null 2>&1 || true
          gh release delete-asset "$RELEASE_TAG" "${APP_NAME}-${RELEASE_TAG}-arm64-v8a.apk" --yes >/dev/null 2>&1 || true
          gh release delete-asset "$RELEASE_TAG" "${APP_NAME}-${RELEASE_TAG}-universal.apk" --yes >/dev/null 2>&1 || true
          gh release upload "$RELEASE_TAG" "$ASSET_PATH" --clobber
